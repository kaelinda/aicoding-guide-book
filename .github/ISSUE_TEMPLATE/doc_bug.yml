name: 文档错误/表述修正
description: 错别字、步骤不可复现、信息过期、示例错误等
title: "[DocBug] "
labels: ["doc", "bug"]
body:
  - type: input
    id: page
    attributes:
      label: 出现问题的页面路径
      description: 例如 docs/基础篇/02-工具安装/01-claude-code.md
      placeholder: 请填写仓库内相对路径
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 发生了什么？为什么不对？
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望的修正方式
      description: 你认为正确的表述、步骤或代码片段（可选）
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 自查
      options:
        - label: 我已确认该问题在 main 分支仍存在
          required: true
        - label: 我已附上必要的截图、日志或代码片段（如适用）
          required: false
