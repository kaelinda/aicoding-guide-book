name: Deploy GitBook to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install GitBook CLI
      run: npm install -g gitbook-cli
    
    - name: Install GitBook plugins
      run: |
        if [ -f book.json ]; then
          gitbook install
        fi
    
    - name: Build GitBook
      run: gitbook build . _book
    
    - name: Copy robots.txt and sitemap.xml
      run: |
        if [ -f robots.txt ]; then
          cp robots.txt _book/
          echo "✅ robots.txt copied"
        fi
        if [ -f sitemap.xml ]; then
          cp sitemap.xml _book/
          echo "✅ sitemap.xml copied"
        fi
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_book'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
