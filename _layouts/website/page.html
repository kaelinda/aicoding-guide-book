{{ super() }}

<div class="giscus-container" style="margin-top: 48px; padding-top: 24px; border-top: 1px solid #e1e4e8;">
    <h2 style="margin-bottom: 16px; color: #24292e; font-size: 1.5em; font-weight: 600;">评论区</h2>
    <script src="https://giscus.app/client.js"

            data-category-id="CATEGORY_ID_PLACEHOLDER"

            data-strict="0"

            crossorigin="anonymous"
